services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=infotecstest;Username=postgres;Password=postgres
    ports:
      - "5000:8080"

  db:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: infotecstest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d infotecstest
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: